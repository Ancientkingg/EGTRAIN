name: Release

# Builds downloadable applications for macOS, Windows, and Linux.
# Main pushes publish a GitHub Release with the three platform packages.
# v* tags publish releases using the tag name. Manual runs test packaging jobs.
on:
  push:
    branches:
      - main
      - ci/release-pipeline
    tags:
      - 'v*'
    paths:
      - '.github/workflows/release.yml'
      - 'CMakeLists.txt'
      - 'Info.plist.in'
      - 'EGTRAIN/QEGTRAIN/**'
  workflow_dispatch:

jobs:
  package-macos:
    name: Package macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install qt@5 libomp zeromq cppzmq nlohmann-json

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH="$(brew --prefix qt@5)"

      - name: Build
        run: cmake --build build --config Release -j

      - name: Bundle Qt and dependencies into the app
        run: |
          set -euxo pipefail
          # macdeployqt copies the Qt frameworks and plugins into the bundle and
          # also relocates the non-Qt dependencies (libomp, libzmq, libsodium)
          # into Contents/Frameworks, rewriting every reference to
          # @executable_path so the app runs without Homebrew.
          "$(brew --prefix qt@5)/bin/macdeployqt" build/QEGTRAIN.app -verbose=1

      - name: Ad-hoc code sign
        # macdeployqt rewrites install names with install_name_tool, which
        # invalidates the code signature. Apple Silicon kills a binary with a
        # broken signature at load (SIGKILL), so re-sign the whole bundle
        # ad-hoc. Students still see a Gatekeeper prompt on first open, but the
        # app launches instead of being killed.
        run: codesign --force --deep --sign - build/QEGTRAIN.app

      - name: Verify the app is self-contained
        run: |
          set -euo pipefail
          APP="build/QEGTRAIN.app"
          test -d "$APP/Contents/Frameworks/QtCore.framework"
          test -d "$APP/Contents/Frameworks/QtCharts.framework"
          test -f "$APP/Contents/Resources/egtrain.icns"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIconFile' "$APP/Contents/Info.plist")" = "egtrain.icns"
          find "$APP" -iname 'libomp*.dylib' | grep -q . || { echo "ERROR: libomp not bundled"; exit 1; }
          find "$APP" -iname 'libzmq*.dylib' | grep -q . || { echo "ERROR: libzmq not bundled"; exit 1; }
          # The main executable (no install-id line) and every bundled dylib
          # (skip the header and their own install-id line) must not reference
          # a Homebrew path as a dependency.
          if otool -L "$APP/Contents/MacOS/QEGTRAIN" | tail -n +2 | grep -E '/opt/homebrew|/usr/local/opt'; then
            echo "ERROR: main executable depends on Homebrew"; exit 1
          fi
          leak=0
          while IFS= read -r f; do
            if otool -L "$f" | tail -n +3 | grep -E '/opt/homebrew|/usr/local/opt'; then
              echo "ERROR: Homebrew dependency in $f"; leak=1
            fi
          done < <(find "$APP" -type f -name '*.dylib')
          [ "$leak" = 0 ] || exit 1
          # The signature must be valid, or Apple Silicon kills the app at launch.
          codesign --verify --deep --strict --verbose=2 "$APP"
          echo "OK: app is self-contained and signed"

      - name: Assemble presentation package
        run: |
          set -euxo pipefail
          PKG="build/dist/QEGTRAIN-Lebanon"
          rm -rf "$PKG"
          mkdir -p "$PKG/Scenes"
          # ditto preserves the signed bundle; plain cp can break the signature.
          ditto build/QEGTRAIN.app "$PKG/QEGTRAIN.app"
          cp build/scene_tool "$PKG/scene_tool"
          ditto EGTRAIN/QEGTRAIN/Scenes/Lebanon "$PKG/Scenes/Lebanon"
          cp docs/guides/lebanon-case-study.md "$PKG/lebanon-case-study.md"

      - name: Verify the presentation package
        run: |
          set -euo pipefail
          PKG="build/dist/QEGTRAIN-Lebanon"
          test -x "$PKG/QEGTRAIN.app/Contents/MacOS/QEGTRAIN"
          test -x "$PKG/scene_tool"
          test -f "$PKG/Scenes/Lebanon/stations.json"
          test -f "$PKG/Scenes/Lebanon/legacy/Tracklines/B7/BlockCumPari.txt"
          test -f "$PKG/lebanon-case-study.md"
          # scene_tool links only header-only JSON, so it runs without Qt.
          set +e
          validation_output="$("$PKG/scene_tool" validate "$PKG/Scenes/Lebanon" 2>&1)"
          validation_status=$?
          set -e
          printf '%s\n' "$validation_output"
          [ "$validation_status" -eq 1 ]
          grep -q scene.services.none <<<"$validation_output"
          grep -q scene.trains.none <<<"$validation_output"
          echo "OK: presentation package holds the app, scene_tool, Lebanon scene, and guide"

      - name: Package zip
        run: |
          cd build/dist
          ditto -c -k --keepParent QEGTRAIN-Lebanon ../QEGTRAIN-macos-arm64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QEGTRAIN-macos-arm64
          path: build/QEGTRAIN-macos-arm64.zip
          if-no-files-found: error

  package-windows:
    name: Package Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: qtcharts
          cache: true

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install ZeroMQ, cppzmq, nlohmann-json (vcpkg)
        shell: pwsh
        run: vcpkg install zeromq cppzmq nlohmann-json --triplet x64-windows

      - name: Configure
        shell: pwsh
        run: >
          cmake -S . -B build
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows
          -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"

      - name: Build
        run: cmake --build build --config Release

      - name: Assemble package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $dist = "dist/QEGTRAIN"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          $exe = Get-ChildItem -Path build -Recurse -Filter QEGTRAIN.exe | Select-Object -First 1
          if (-not $exe) { throw "QEGTRAIN.exe not found under build/" }
          Copy-Item $exe.FullName "$dist/QEGTRAIN.exe"
          # ZeroMQ + libsodium runtime DLLs from vcpkg
          Copy-Item "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin/*.dll" $dist/ -ErrorAction SilentlyContinue
          # Qt runtime: DLLs + platform/imageformat plugins next to the exe
          & "$env:QT_ROOT_DIR/bin/windeployqt.exe" --release --no-translations --compiler-runtime "$dist/QEGTRAIN.exe"
          # Case data. The app resolves Input/ from the working directory;
          # double-clicking the exe sets the working directory to its own
          # folder, so the data must sit beside it. Images ship inside the
          # binary as Qt resources.
          Copy-Item -Recurse EGTRAIN/QEGTRAIN/Input "$dist/Input"
          # Presentation package: the command-line tool, the Lebanon scene, and
          # the guide. scene_tool links only header-only JSON, so it needs no Qt.
          $tool = Get-ChildItem -Path build -Recurse -Filter scene_tool.exe | Select-Object -First 1
          if (-not $tool) { throw "scene_tool.exe not found under build/" }
          Copy-Item $tool.FullName "$dist/scene_tool.exe"
          New-Item -ItemType Directory -Force -Path "$dist/Scenes" | Out-Null
          Copy-Item -Recurse EGTRAIN/QEGTRAIN/Scenes/Lebanon "$dist/Scenes/Lebanon"
          Copy-Item docs/guides/lebanon-case-study.md "$dist/lebanon-case-study.md"

      - name: Verify the package is complete
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $dist = "dist/QEGTRAIN"
          if (-not (Test-Path "$dist/QEGTRAIN.exe")) { throw "missing QEGTRAIN.exe" }
          foreach ($dll in @("Qt5Core.dll","Qt5Gui.dll","Qt5Widgets.dll","Qt5Charts.dll","Qt5Svg.dll")) {
            if (-not (Test-Path "$dist/$dll")) { throw "missing $dll" }
          }
          if (-not (Test-Path "$dist/platforms/qwindows.dll")) { throw "missing platforms/qwindows.dll" }
          if (-not (Test-Path "$dist/imageformats/qsvg.dll")) { throw "missing imageformats/qsvg.dll" }
          if (-not (Get-ChildItem "$dist" -Filter "libzmq*.dll")) { throw "missing libzmq DLL" }
          if (-not (Test-Path "$dist/Input/Input_EGTRAIN_Paimpol")) { throw "missing Input case data" }
          if (-not (Test-Path "$dist/scene_tool.exe")) { throw "missing scene_tool.exe" }
          if (-not (Test-Path "$dist/Scenes/Lebanon/stations.json")) { throw "missing Lebanon scene" }
          if (-not (Test-Path "$dist/Scenes/Lebanon/legacy/Tracklines/B7/BlockCumPari.txt")) { throw "missing Lebanon track passthrough" }
          if (-not (Test-Path "$dist/lebanon-case-study.md")) { throw "missing Lebanon guide" }
          Write-Host "OK: exe, Qt runtime, libzmq, Input data, scene_tool, Lebanon scene, and guide are present"

      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path dist/QEGTRAIN/* -DestinationPath QEGTRAIN-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QEGTRAIN-windows-x64
          path: QEGTRAIN-windows-x64.zip
          if-no-files-found: error

  package-linux:
    name: Package Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake patchelf wget file desktop-file-utils \
            qtbase5-dev qttools5-dev qttools5-dev-tools libqt5charts5-dev libqt5svg5-dev \
            libzmq3-dev cppzmq-dev nlohmann-json3-dev libomp-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j"$(nproc)"

      - name: Assemble AppDir
        run: |
          set -euxo pipefail
          APPDIR="$PWD/AppDir"
          mkdir -p \
            "$APPDIR/usr/bin" \
            "$APPDIR/usr/share/applications" \
            "$APPDIR/usr/share/icons/hicolor/256x256/apps"

          EXE="$(find build -type f -perm -111 -name QEGTRAIN | head -n 1)"
          test -n "$EXE"
          cp "$EXE" "$APPDIR/usr/bin/QEGTRAIN"

          # Case data lives beside the executable. The app falls back to this
          # location when launched outside the package tree. Images ship inside
          # the binary as Qt resources.
          cp -R EGTRAIN/QEGTRAIN/Input "$APPDIR/usr/bin/Input"

          # Presentation package: the command-line tool, the Lebanon scene, and
          # the guide, bundled beside the executable. scene_tool links only
          # header-only JSON, so it carries no Qt dependency.
          TOOL="$(find build -type f -perm -111 -name scene_tool | head -n 1)"
          test -n "$TOOL"
          cp "$TOOL" "$APPDIR/usr/bin/scene_tool"
          mkdir -p "$APPDIR/usr/bin/Scenes"
          cp -R EGTRAIN/QEGTRAIN/Scenes/Lebanon "$APPDIR/usr/bin/Scenes/Lebanon"
          cp docs/guides/lebanon-case-study.md "$APPDIR/usr/bin/lebanon-case-study.md"
          test -x "$APPDIR/usr/bin/scene_tool"
          test -f "$APPDIR/usr/bin/Scenes/Lebanon/stations.json"
          test -f "$APPDIR/usr/bin/Scenes/Lebanon/legacy/Tracklines/B7/BlockCumPari.txt"
          test -f "$APPDIR/usr/bin/lebanon-case-study.md"
          cp EGTRAIN/QEGTRAIN/resources/app/egtrain-256.png \
            "$APPDIR/usr/share/icons/hicolor/256x256/apps/qegtrain.png"

          cat > "$APPDIR/usr/share/applications/qegtrain.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=EGTRAIN
          Exec=QEGTRAIN
          Icon=qegtrain
          Categories=Education;Science;
          Terminal=false
          EOF
          chmod +x "$APPDIR/usr/bin/QEGTRAIN"

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          VERSION: "1.0"
        run: |
          set -euxo pipefail
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage appimagetool-x86_64.AppImage

          export QMAKE
          QMAKE="$(command -v qmake || command -v qmake-qt5 || echo /usr/lib/qt5/bin/qmake)"
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable AppDir/usr/bin/QEGTRAIN \
            --desktop-file AppDir/usr/share/applications/qegtrain.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/qegtrain.png \
            --plugin qt

          ./appimagetool-x86_64.AppImage AppDir QEGTRAIN-linux-x86_64.AppImage

      - name: Verify AppImage contents
        run: |
          set -euxo pipefail
          test -s QEGTRAIN-linux-x86_64.AppImage
          chmod +x QEGTRAIN-linux-x86_64.AppImage
          ./QEGTRAIN-linux-x86_64.AppImage --appimage-extract >/dev/null
          test -x squashfs-root/usr/bin/QEGTRAIN
          test -d squashfs-root/usr/bin/Input/Input_EGTRAIN_Paimpol
          test -f squashfs-root/usr/share/icons/hicolor/256x256/apps/qegtrain.png
          test -f squashfs-root/AppRun
          find squashfs-root -name 'libQt5Core.so*' -print -quit | grep -q .
          echo "OK: AppImage contains executable, Qt runtime, and Input data"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QEGTRAIN-linux-x86_64
          path: QEGTRAIN-linux-x86_64.AppImage
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [package-macos, package-windows, package-linux]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded files
        run: find artifacts -type f

      - name: Set release metadata
        id: release-meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            tag="$GITHUB_REF_NAME"
            name="EGTRAIN $GITHUB_REF_NAME"
            if [[ "$GITHUB_REF_NAME" == *-* ]]; then
              prerelease=true
              make_latest=false
            else
              prerelease=false
              make_latest=true
            fi
          else
            short_sha="${GITHUB_SHA::7}"
            tag="main-${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}-${short_sha}"
            name="EGTRAIN main build ${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT} (${short_sha})"
            prerelease=true
            make_latest=false
          fi

          {
            echo "tag=$tag"
            echo "name=$name"
            echo "prerelease=$prerelease"
            echo "make_latest=$make_latest"
          } >> "$GITHUB_OUTPUT"

      - name: Verify release assets
        shell: bash
        run: |
          set -euo pipefail
          expected=(
            artifacts/QEGTRAIN-macos-arm64/QEGTRAIN-macos-arm64.zip
            artifacts/QEGTRAIN-windows-x64/QEGTRAIN-windows-x64.zip
            artifacts/QEGTRAIN-linux-x86_64/QEGTRAIN-linux-x86_64.AppImage
          )

          for file in "${expected[@]}"; do
            test -s "$file"
          done

          count="$(find artifacts -type f | wc -l | tr -d ' ')"
          if [[ "$count" != "3" ]]; then
            echo "Expected exactly 3 release assets, found $count"
            find artifacts -type f -print
            exit 1
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release-meta.outputs.name }}
          files: |
            artifacts/QEGTRAIN-macos-arm64/QEGTRAIN-macos-arm64.zip
            artifacts/QEGTRAIN-windows-x64/QEGTRAIN-windows-x64.zip
            artifacts/QEGTRAIN-linux-x86_64/QEGTRAIN-linux-x86_64.AppImage
          prerelease: ${{ steps.release-meta.outputs.prerelease }}
          make_latest: ${{ steps.release-meta.outputs.make_latest }}
          fail_on_unmatched_files: true
          body: |
            Automated EGTRAIN build for `${{ steps.release-meta.outputs.name }}`.

            - Commit: ${{ github.sha }}
            - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Download the package for your platform, unzip, and run.
